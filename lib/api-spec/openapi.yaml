openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dientes Fijos Medellín CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard stats and overview
  - name: patients
    description: Patient management
  - name: appointments
    description: Appointment scheduling
  - name: conversations
    description: WhatsApp conversations
  - name: messages
    description: Chat messages
  - name: whatsapp
    description: WhatsApp connection
  - name: automations
    description: Automation rules
  - name: treatments
    description: Dental treatments catalog
  - name: settings
    description: Clinic settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard overview statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/appointments-today:
    get:
      operationId: getTodayAppointments
      tags: [dashboard]
      summary: Get today's appointments list
      responses:
        "200":
          description: Today's appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/monthly-chart:
    get:
      operationId: getMonthlyChart
      tags: [dashboard]
      summary: Get monthly appointment and patient stats for chart
      responses:
        "200":
          description: Monthly chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyChartPoint"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: treatment
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /patients/stats/by-status:
    get:
      operationId: getPatientsByStatus
      tags: [patients]
      summary: Get patient counts grouped by status
      responses:
        "200":
          description: Patient status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: patientId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: view
          in: query
          schema:
            type: string
            enum: [day, week, month]
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "409":
          description: Time slot conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Cancel appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /appointments/available-slots:
    get:
      operationId: getAvailableSlots
      tags: [appointments]
      summary: Get available time slots for a given date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: duration
          in: query
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Available time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSlot"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all WhatsApp conversations
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: label
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with patient info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"

  /conversations/{id}/mode:
    put:
      operationId: setConversationMode
      tags: [conversations]
      summary: Toggle AI vs human control for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetConversationModeBody"
      responses:
        "200":
          description: Mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/stats/unread:
    get:
      operationId: getUnreadConversationStats
      tags: [conversations]
      summary: Get unread message counts and pending conversations
      responses:
        "200":
          description: Unread stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadStats"

  /messages/{conversationId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages for a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /whatsapp/status:
    get:
      operationId: getWhatsappStatus
      tags: [whatsapp]
      summary: Get WhatsApp connection status
      responses:
        "200":
          description: WhatsApp status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/qr:
    get:
      operationId: getWhatsappQr
      tags: [whatsapp]
      summary: Get QR code for WhatsApp connection
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappQr"

  /whatsapp/disconnect:
    post:
      operationId: disconnectWhatsapp
      tags: [whatsapp]
      summary: Disconnect WhatsApp session
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /automations:
    get:
      operationId: listAutomations
      tags: [automations]
      summary: List automation rules
      responses:
        "200":
          description: List of automations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"
    post:
      operationId: createAutomation
      tags: [automations]
      summary: Create automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationBody"
      responses:
        "201":
          description: Automation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  /automations/{id}:
    put:
      operationId: updateAutomation
      tags: [automations]
      summary: Update automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationBody"
      responses:
        "200":
          description: Automation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    delete:
      operationId: deleteAutomation
      tags: [automations]
      summary: Delete automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Automation deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /treatments:
    get:
      operationId: listTreatments
      tags: [treatments]
      summary: List all treatments
      responses:
        "200":
          description: List of treatments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Treatment"
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Create treatment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreatmentBody"
      responses:
        "201":
          description: Treatment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"

  /treatments/{id}:
    put:
      operationId: updateTreatment
      tags: [treatments]
      summary: Update treatment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTreatmentBody"
      responses:
        "200":
          description: Treatment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"
    delete:
      operationId: deleteTreatment
      tags: [treatments]
      summary: Delete treatment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get clinic settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update clinic settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    DashboardStats:
      type: object
      properties:
        totalPatients:
          type: integer
        newPatientsThisMonth:
          type: integer
        appointmentsToday:
          type: integer
        appointmentsThisWeek:
          type: integer
        pendingMessages:
          type: integer
        confirmedAppointments:
          type: integer
        estimatedMonthlyRevenue:
          type: number
        activeConversations:
          type: integer
      required:
        - totalPatients
        - newPatientsThisMonth
        - appointmentsToday
        - appointmentsThisWeek
        - pendingMessages
        - confirmedAppointments
        - estimatedMonthlyRevenue
        - activeConversations

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [new_patient, appointment_created, appointment_confirmed, message_received, appointment_cancelled]
        description:
          type: string
        patientName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, createdAt]

    MonthlyChartPoint:
      type: object
      properties:
        month:
          type: string
        appointments:
          type: integer
        newPatients:
          type: integer
        revenue:
          type: number
      required: [month, appointments, newPatients, revenue]

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required: [status, count]

    Patient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
        treatment:
          type: string
        status:
          type: string
          enum: [new, interested, scheduled, attended, in_treatment, completed]
        lastVisit:
          type: string
          format: date
          nullable: true
        nextAppointment:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, phone, status, createdAt]

    CreatePatientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
        treatment:
          type: string
        status:
          type: string
          enum: [new, interested, scheduled, attended, in_treatment, completed]
        notes:
          type: string
      required: [name, phone]

    UpdatePatientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
        treatment:
          type: string
        status:
          type: string
          enum: [new, interested, scheduled, attended, in_treatment, completed]
        notes:
          type: string

    Appointment:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        patientName:
          type: string
        patientPhone:
          type: string
        treatment:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        status:
          type: string
          enum: [scheduled, confirmed, completed, cancelled, no_show]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, patientId, patientName, treatment, date, startTime, endTime, status, createdAt]

    CreateAppointmentBody:
      type: object
      properties:
        patientId:
          type: integer
        treatment:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        duration:
          type: integer
          default: 60
        notes:
          type: string
      required: [patientId, treatment, date, startTime]

    UpdateAppointmentBody:
      type: object
      properties:
        treatment:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        duration:
          type: integer
        status:
          type: string
          enum: [scheduled, confirmed, completed, cancelled, no_show]
        notes:
          type: string

    TimeSlot:
      type: object
      properties:
        startTime:
          type: string
        endTime:
          type: string
        available:
          type: boolean
      required: [startTime, endTime, available]

    Conversation:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
          nullable: true
        patientName:
          type: string
        phone:
          type: string
        lastMessage:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        unreadCount:
          type: integer
        label:
          type: string
          nullable: true
        aiMode:
          type: boolean
        status:
          type: string
          enum: [active, archived, pending]
      required: [id, patientName, phone, unreadCount, aiMode, status]

    ConversationDetail:
      type: object
      properties:
        conversation:
          $ref: "#/components/schemas/Conversation"
        patient:
          $ref: "#/components/schemas/Patient"
          nullable: true
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [conversation, messages]

    SetConversationModeBody:
      type: object
      properties:
        aiMode:
          type: boolean
      required: [aiMode]

    UnreadStats:
      type: object
      properties:
        totalUnread:
          type: integer
        pendingConversations:
          type: integer
        aiHandled:
          type: integer
      required: [totalUnread, pendingConversations, aiHandled]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        content:
          type: string
        sender:
          type: string
          enum: [patient, agent, ai]
        sentAt:
          type: string
          format: date-time
        read:
          type: boolean
      required: [id, conversationId, content, sender, sentAt, read]

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required: [content]

    WhatsappStatus:
      type: object
      properties:
        connected:
          type: boolean
        phone:
          type: string
          nullable: true
        connectedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [connected, disconnected, connecting, waiting_qr]
      required: [connected, status]

    WhatsappQr:
      type: object
      properties:
        qrCode:
          type: string
          nullable: true
        status:
          type: string
          enum: [waiting, scanned, connected, expired]
      required: [status]

    Automation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        trigger:
          type: string
          enum: [appointment_reminder, follow_up, new_patient_welcome, appointment_confirmed, missed_appointment, reactivation]
        message:
          type: string
        delayHours:
          type: integer
          nullable: true
        active:
          type: boolean
        executionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, trigger, message, active, executionCount, createdAt]

    CreateAutomationBody:
      type: object
      properties:
        name:
