<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = "nexodent-theme";
        var stored = localStorage.getItem(key);
        var theme = stored === "dark" || stored === "light" || stored === "system" ? stored : "light";
        var resolved = theme === "system"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : theme;
        if (resolved === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nexodent CRM — Gestión Dental Inteligente</title>
    <meta name="description" content="Nexodent: CRM dental con bot de WhatsApp inteligente, gestión de pacientes, citas y más." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
