# Configuración de Render Blueprint — Nexodent
databases:
  - name: nexodent-db
    plan: free
    postgresMajorVersion: "15"

services:
  - type: web
    name: nexodent-api
    env: node
    plan: free
    buildCommand: pip install edge-tts 2>/dev/null || true; pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexodent-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false   # Configurar manualmente en Render Dashboard
      - key: NODE_ENV
        value: production
