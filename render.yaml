# Configuración de Render Blueprint
databases:
  - name: dientesbot-db
    plan: free
    postgresMajorVersion: "15"

services:
  - type: web
    name: dientesbot-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dientesbot-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
